spring:
  application:
    name: boardProject_rest
  jpa:
    show-sql: false
    properties:
      hibernate:
        format_sql: false
        dialect: org.hibernate.dialect.MySQL8Dialect
    hibernate:
      naming:
        physical-strategy: org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
      ddl-auto: none
    generate-ddl: off
    database: mysql

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB
      enabled: true


  devtools:
    restart:
      enabled: false

  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/boardProject?characterEncoding=UTF-8&serverTimezone=Asia/Seoul
    username: root
    password: dm1234

  redis:
    host: localhost
    port: 6379

  config:
    import:
      - classpath:secret.yml
      - classpath:jwt-redis.yml
      - classpath:jwt-token.yml
      - classpath:cookie.yml

  jackson:
    serialization:
      write-dates-as-timestamps: false
    date-format: yyyy-MM-dd HH:mm:ss.SSS
    time-zone: Asia/Seoul

server:
  port: 8080

logging:
  file:
    path: logback-spring